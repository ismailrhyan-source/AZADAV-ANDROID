name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # Menambahkan autoconf-archive untuk memperbaiki error libffi
        sudo apt-get install -y build-essential ccache git libncurses5-dev libncursesw5-dev libffi-dev libssl-dev libtool pkg-config zlib1g-dev zip unzip openjdk-17-jdk python3-pip autoconf-archive automake
        pip install --upgrade buildozer cython

    - name: Setup Android SDK
      run: |
        export SDK_ROOT=/home/runner/android-sdk
        mkdir -p $SDK_ROOT/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip -d $SDK_ROOT/cmdline-tools
        mv $SDK_ROOT/cmdline-tools/cmdline-tools $SDK_ROOT/cmdline-tools/latest
        export PATH=$PATH:$SDK_ROOT/cmdline-tools/latest/bin
        yes "y" | sdkmanager --sdk_root=$SDK_ROOT --licenses
        sdkmanager --sdk_root=$SDK_ROOT "platform-tools" "platforms;android-34" "build-tools;34.0.0"
        
        mkdir -p $SDK_ROOT/tools/bin
        ln -s $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $SDK_ROOT/tools/bin/sdkmanager
        
        echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
        echo "ANDROID_HOME=$SDK_ROOT" >> $GITHUB_ENV

    - name: Build with Buildozer
      run: |
        # 1. Bersihkan sisa build lama yang mungkin sudah korup
        rm -rf .buildozer/android/platform
        
        # 2. BERIKAN "KAMUS" MACRO: Ini adalah kunci untuk error LT_SYS_SYMBOL_USCORE
        # Kita memberitahu autoconf untuk melihat ke folder sistem tempat libtool.m4 berada
        export ACLOCAL_PATH=/usr/share/aclocal
        
        # 3. Bersihkan Environment agar tidak ada konflik NDK
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK
        unset ANDROID_NDK_ROOT
        
        # 4. Jalankan buildozer
        buildozer -v android debug
